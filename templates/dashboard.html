{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
{% endblock %}

{% block content %}

<div class="dashboard-container">

    <h1 class="page-title">
        <i class="fas fa-tachometer-alt"></i> Dashboard Overview
    </h1>

    <div class="stats-grid">

        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-boxes"></i>
            </div>
            <div class="stat-info">
                <h3>TOTAL PRODUCTS</h3>
                <div class="stat-number" id="totalProducts">0</div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <div class="stat-info">
                <h3>TODAY'S SALES</h3>
                <div class="stat-number" id="todaySales">0</div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="stat-info">
                <h3>LOW STOCK</h3>
                <div class="stat-number" id="lowStock">0</div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-cash-register"></i>
            </div>
            <div class="stat-info">
                <h3>TRANSACTIONS</h3>
                <div class="stat-number" id="totalTransactions">0</div>
            </div>
        </div>

    </div>

    <div class="dashboard-charts">

        <!-- Weekly Sales -->
        <div class="chart-card">
            <h3>Weekly Sales</h3>
            <canvas id="salesChart" height="200"></canvas>
        </div>

        <!-- Monthly Sales -->
        <div class="chart-card">
            <h3>Monthly Sales</h3>

            <div style="margin-bottom: 10px;">
                <select id="monthSelector">
                    <option value="0">January</option>
                    <option value="1">February</option>
                    <option value="2">March</option>
                    <option value="3">April</option>
                    <option value="4">May</option>
                    <option value="5">June</option>
                    <option value="6">July</option>
                    <option value="7">August</option>
                    <option value="8">September</option>
                    <option value="9">October</option>
                    <option value="10">November</option>
                    <option value="11">December</option>
                </select>
            </div>

            <canvas id="monthlyChart" height="200"></canvas>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions-wrapper">
            <div class="quick-actions">

                <a href="{% url 'pos' %}" class="quick-action-btn">
                    <i class="fas fa-shopping-cart"></i>
                    <span>New Sale</span>
                </a>

                <a href="{% url 'products' %}" class="quick-action-btn">
                    <i class="fas fa-plus-circle"></i>
                    <span>Add Product</span>
                </a>

            </div>
        </div>

    </div>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // =========================
    // LOAD DATA
    // =========================
    let products = JSON.parse(localStorage.getItem('products')) || [];
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    // =========================
    // TOTAL PRODUCTS
    // =========================
    let totalProductsEl = document.getElementById('totalProducts');
    if (totalProductsEl) totalProductsEl.innerText = products.length;

    // =========================
    // LOW STOCK (<=5)
    // =========================
    let lowStock = products.filter(p => p.stock <= 5).length;
    let lowStockEl = document.getElementById('lowStock');
    if (lowStockEl) lowStockEl.innerText = lowStock;

    // =========================
    // TOTAL TRANSACTIONS
    // =========================
    let totalTransactionsEl = document.getElementById('totalTransactions');
    if (totalTransactionsEl) totalTransactionsEl.innerText = transactions.length;

    // =========================
    // TODAY SALES
    // =========================
    let today = new Date().toLocaleDateString();

    let todaySales = transactions
        .filter(t => new Date(t.date).toLocaleDateString() === today)
        .reduce((sum, t) => sum + t.total, 0);

    let todaySalesEl = document.getElementById('todaySales');
    if (todaySalesEl) todaySalesEl.innerText = '₱ ' + todaySales.toFixed(2);

    // =========================
    // LOGIN CHECK
    // =========================
    if (localStorage.getItem('loggedIn') !== 'true') {
        window.location.href = '/accounts/login/';
    }

    let userEl = document.getElementById('userName');
    if (userEl) {
        userEl.innerText = localStorage.getItem('username') || 'User';
    }

    // =========================
    // WEEKLY SALES CHART
    // =========================
    function getWeeklySales() {
        let labels = [];
        let data = [];

        for (let i = 6; i >= 0; i--) {
            let d = new Date();
            d.setDate(d.getDate() - i);

            let dayLabel = d.toLocaleDateString('en-US', { weekday: 'short' });
            labels.push(dayLabel);

            let total = 0;

            transactions.forEach(t => {
                let td = new Date(t.date);

                if (
                    td.getDate() === d.getDate() &&
                    td.getMonth() === d.getMonth() &&
                    td.getFullYear() === d.getFullYear()
                ) {
                    total += t.total;
                }
            });

            data.push(total);
        }

        return { labels, data };
    }

    let chartEl = document.getElementById('salesChart');

    if (chartEl) {
        let weekly = getWeeklySales();

        new Chart(chartEl, {
            type: 'line',
            data: {
                labels: weekly.labels,
                datasets: [{
                    label: 'Sales (₱)',
                    data: weekly.data,
                    borderColor: '#1e6f5c',
                    backgroundColor: 'rgba(30,111,92,0.1)',
                    tension: 0.4,
                    fill: true
                }]
            }
        });
    }

    // =========================
    // MONTHLY SALES CHART
    // =========================
    function getMonthlySales(selectedMonth) {
        let labels = [];
        let data = [];

        let year = new Date().getFullYear();
        let daysInMonth = new Date(year, selectedMonth + 1, 0).getDate();

        for (let i = 1; i <= daysInMonth; i++) {
            labels.push(i);

            let total = 0;

            transactions.forEach(t => {
                let d = new Date(t.date);

                if (
                    d.getDate() === i &&
                    d.getMonth() === selectedMonth &&
                    d.getFullYear() === year
                ) {
                    total += t.total;
                }
            });

            data.push(total);
        }

        return { labels, data };
    }

    let monthlyEl = document.getElementById('monthlyChart');
    let monthSelector = document.getElementById('monthSelector');
    let monthlyChart;
    let currentMonth = new Date().getMonth();

    if (monthSelector) {
        monthSelector.value = currentMonth;
    }

    function renderMonthlyChart(month) {
        if (!monthlyEl) return;

        let monthly = getMonthlySales(parseInt(month));

        if (monthlyChart) {
            monthlyChart.destroy();
        }

        monthlyChart = new Chart(monthlyEl, {
            type: 'bar',
            data: {
                labels: monthly.labels,
                datasets: [{
                    label: 'Daily Sales (₱)',
                    data: monthly.data,
                    backgroundColor: 'rgba(30,111,92,0.5)',
                    borderColor: '#1e6f5c',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }

    renderMonthlyChart(currentMonth);

    if (monthSelector) {
        monthSelector.addEventListener('change', function () {
            renderMonthlyChart(this.value);
        });
    }

    let role = localStorage.getItem('role');
    if (role !== 'admin') {
        window.location.href = '/pos/';
    }

});

// =========================
// SIDEBAR TOGGLE
// =========================
let toggleBtn = document.getElementById('sidebarToggle');

if (toggleBtn) {
    toggleBtn.addEventListener('click', function () {
        document.querySelector('.sidebar').classList.toggle('active');
    });
}

// =========================
// LOGOUT
// =========================
function logout() {
    localStorage.removeItem('loggedIn');
    localStorage.removeItem('username');
    window.location.href = '/accounts/login/';
}
</script>

{% endblock %}
