{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pos.css' %}">
{% endblock %}

{% block content %}

<div class="pos-container">

    <!-- Products Panel -->
    <div class="pos-products">
        <div class="pos-header">
            <h2><i class="fas fa-search"></i> Select Products</h2>
            <input type="text" id="searchInput" class="product-search" placeholder="Search products...">
            
            <select id="categoryFilter" class="category-filter">
                <option value="all">All Categories</option>
                <option value="Rice & Grains">Rice & Grains</option>
                <option value="Oils & Cooking">Oils & Cooking</option>
                <option value="Dairy & Eggs">Dairy & Eggs</option>
                <option value="Beverages">Beverages</option>
                <option value="Canned Goods">Canned Goods</option>
            </select>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Cart Panel -->
    <div class="pos-cart">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-cart"></i> Current Sale</h2>
            <button class="btn-clear" id="clearCartBtn">
                <i class="fas fa-trash"></i> Clear Cart
            </button>
        </div>
        
        <div class="cart-items">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cartBody"></tbody>
            </table>
        </div>
        
        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">₱0.00</span>
            </div>
            <div class="summary-row">
                <span>Tax (12%):</span>
                <span id="tax">₱0.00</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span id="totalAmount">₱0.00</span>
            </div>
        </div>
        
        <div class="payment-section">
            <div class="payment-input">
                <label>Amount Received:</label>
                <input type="number" id="amountReceived" placeholder="0.00">
            </div>
            <div class="change-due">
                <label>Change:</label>
                <span id="changeDue">₱0.00</span>
            </div>

            <button class="btn-checkout" id="checkoutBtn">
                <i class="fas fa-check-circle"></i> Complete Sale
            </button>
        </div>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    let products = JSON.parse(localStorage.getItem('products')) || [];


    let cart = [];

    function renderProducts() {
        let search = document.getElementById('searchInput').value.toLowerCase();
        let category = document.getElementById('categoryFilter').value;

        let filtered = products.filter(p =>
    p.stock > 0 && // ✅ hide out-of-stock
    p.name.toLowerCase().includes(search) &&
    (category === 'all' || p.category === category)
);

        document.getElementById('productsGrid').innerHTML = filtered.map(p => `
            <div class="product-card" onclick="addToCart(${p.id})">
                <h4>${p.name}</h4>
                <div class="product-price">₱${p.price.toFixed(2)}</div>
                <div class="product-stock">Stock: ${p.stock}</div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        let product = products.find(p => p.id === id);
        if (product.stock <= 0) return alert('Out of stock!');

        let existing = cart.find(i => i.id === id);
        if (existing) existing.qty++;
        else cart.push({ ...product, qty: 1 });

        renderCart();
    }

    function renderCart() {
        let subtotal = 0;

        document.getElementById('cartBody').innerHTML = cart.map((item, i) => {
            let total = item.price * item.qty;
            subtotal += total;

            return `
                <tr>
                    <td>${item.name}</td>
                    <td><input type="number" value="${item.qty}" onchange="updateQty(${i}, this.value)"></td>
                    <td>₱${item.price}</td>
                    <td>₱${total}</td>
                    <td><button onclick="removeFromCart(${i})">X</button></td>
                </tr>
            `;
        }).join('');

        let tax = subtotal * 0.12;
        let total = subtotal + tax;

        document.getElementById('subtotal').innerText = '₱ ' + subtotal.toFixed(2);
document.getElementById('tax').innerText = '₱ ' + tax.toFixed(2);
document.getElementById('totalAmount').innerText = '₱ ' + total.toFixed(2);
    }

    function updateQty(i, qty) {
        cart[i].qty = parseInt(qty);
        renderCart();
    }
    

    function removeFromCart(i) {
        cart.splice(i, 1);
        renderCart();
    }

    document.getElementById('searchInput').addEventListener('input', renderProducts);
    document.getElementById('categoryFilter').addEventListener('change', renderProducts);

    renderProducts();

    window.addToCart = addToCart;
window.updateQty = updateQty;
window.removeFromCart = removeFromCart;

    function updateChange() {
    let totalText = document.getElementById('totalAmount').innerText;
    let total = parseFloat(totalText.replace('₱', '').trim());

    let received = parseFloat(document.getElementById('amountReceived').value) || 0;

    let change = received - total;

    document.getElementById('changeDue').innerText = '₱ ' + change.toFixed(2);
}

    document.getElementById('amountReceived').addEventListener('input', updateChange);

    function checkout() {
    if (cart.length === 0) {
        alert('Cart is empty!');
        return;
    }

    let totalText = document.getElementById('totalAmount').innerText;
    let total = parseFloat(totalText.replace('₱', '').trim());

    let received = parseFloat(document.getElementById('amountReceived').value) || 0;

    if (received < total) {
        alert('Insufficient payment!');
        return;
    }

    let products = JSON.parse(localStorage.getItem('products')) || [];

    cart.forEach(item => {
        let product = products.find(p => p.id === item.id);
        if (product) {
            product.stock -= item.qty;
        }
    });

    localStorage.setItem('products', JSON.stringify(products));

    let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');

    transactions.unshift({
        id: Date.now(),
        date: new Date().toISOString(), 
        items: [...cart],
        total: total
    });

    localStorage.setItem('transactions', JSON.stringify(transactions));

    alert('Sale completed!\nTotal: ₱ ' + total.toFixed(2));

    cart = [];
    document.getElementById('amountReceived').value = '';
    renderCart();
    renderProducts();

    document.getElementById('changeDue').innerText = '₱ 0.00';
}
document.getElementById('checkoutBtn').addEventListener('click', checkout);

});
function logout() {
    localStorage.removeItem('loggedIn');
    localStorage.removeItem('username');
    window.location.href = '/accounts/login/';
}
let role = localStorage.getItem('role');

if (role !== 'admin' && role !== 'cashier') {
    window.location.href = '/accounts/login/';
}
</script>

{% endblock %}
