<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrocerEase - Sales & Inventory System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar will be injected by JS -->
        <div id="sidebar-placeholder"></div>
        
        <div class="main-content">
            <!-- Navbar will be injected by JS -->
            <div id="navbar-placeholder"></div>
            
            <div class="content-wrapper">
                <div id="alerts-placeholder"></div>
                <div id="page-content"></div>
            </div>
            
            <!-- Footer will be injected by JS -->
            <div id="footer-placeholder"></div>
        </div>
    </div>

    <script>
        // Check if logged in
        if (localStorage.getItem('loggedIn') !== 'true' && !window.location.pathname.includes('login.html')) {
            window.location.href = 'accounts/login.html';
        }
        
        // Load sidebar
        fetch('../partials/sidebar.html')
            .then(response => response.text())
            .then(data => document.getElementById('sidebar-placeholder').innerHTML = data);
        
        // Load navbar
        fetch('../partials/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar-placeholder').innerHTML = data);
        
        // Load footer
        fetch('../partials/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data);
        
        function logout() {
            localStorage.removeItem('loggedIn');
            localStorage.removeItem('username');
            window.location.href = 'accounts/login.html';
        }
    </script>
</body>
</html>
