<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrocerEase - Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        .products-container {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .search-bar {
            margin-bottom: 20px;
        }
        
        .search-bar input {
            width: 100%;
            max-width: 300px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .products-table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }
        
        .products-table th,
        .products-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .products-table th {
            background: var(--light);
            font-weight: 600;
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        
        .status-in-stock {
            background: #d4edda;
            color: #155724;
        }
        
        .status-low-stock {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-out-stock {
            background: #f8d7da;
            color: #721c24;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn-edit, .btn-delete {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-edit {
            background: var(--info);
            color: white;
        }
        
        .btn-delete {
            background: var(--danger);
            color: white;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
        }
        
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .btn-save {
            background: var(--primary);
            color: white;
        }
        
        .btn-cancel {
            background: var(--gray);
            color: white;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-store"></i>
                <h2>Grocer<span>Ease</span></h2>
            </div>
            <ul class="sidebar-menu">
                <li class="menu-item"><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="menu-item"><a href="pos.html"><i class="fas fa-shopping-cart"></i> Point of Sale</a></li>
                <li class="menu-item active"><a href="products.html"><i class="fas fa-boxes"></i> Products</a></li>
                <li class="menu-item"><a href="orders.html"><i class="fas fa-truck"></i> Orders</a></li>
                <li class="menu-item"><a href="reports.html"><i class="fas fa-chart-line"></i> Reports</a></li>
            </ul>
        </div>

        <div class="main-content">
            <nav class="navbar">
                <div class="nav-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="nav-user">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </nav>

            <div class="content-wrapper">
                <div class="products-container">
                    <div class="page-header">
                        <h1><i class="fas fa-boxes"></i> Product Inventory</h1>
                        <button class="btn-add" onclick="openAddModal()">
                            <i class="fas fa-plus"></i> Add Product
                        </button>
                    </div>
                    
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search products...">
                    </div>
                    
                    <div class="table-container">
                        <table class="products-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <footer class="footer">
                <p>&copy; 2026 GrocerEase - All rights reserved</p>
            </footer>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add New Product</h3>
            <input type="hidden" id="productId">
            <input type="text" id="productName" placeholder="Product Name">
            <select id="productCategory">
                <option value="Rice & Grains">Rice & Grains</option>
                <option value="Oils & Cooking">Oils & Cooking</option>
                <option value="Dairy & Eggs">Dairy & Eggs</option>
                <option value="Beverages">Beverages</option>
                <option value="Canned Goods">Canned Goods</option>
                <option value="Bakery">Bakery</option>
            </select>
            <input type="number" id="productPrice" placeholder="Price">
            <input type="number" id="productStock" placeholder="Stock Quantity">
            <div class="modal-actions">
                <button class="btn-save" onclick="saveProduct()">Save</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'accounts/login.html';
        }
        
        document.getElementById('userName').innerText = localStorage.getItem('username') || 'User';
        
        let products = JSON.parse(localStorage.getItem('products')) || [
            { id: 1, name: "Rice (5kg)", price: 245, stock: 12, category: "Rice & Grains" },
            { id: 2, name: "Cooking Oil 1L", price: 89.5, stock: 8, category: "Oils & Cooking" },
            { id: 3, name: "Milk 1L", price: 68, stock: 5, category: "Dairy & Eggs" },
            { id: 4, name: "Eggs (12pcs)", price: 120, stock: 15, category: "Dairy & Eggs" },
            { id: 5, name: "Bread", price: 55, stock: 3, category: "Bakery" },
            { id: 6, name: "Tomato Ketchup", price: 45, stock: 7, category: "Canned Goods" }
        ];
        
        let nextId = 7;
        
        function saveProducts() {
            localStorage.setItem('products', JSON.stringify(products));
        }
        
        function renderProducts() {
            let search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = products.filter(p => p.name.toLowerCase().includes(search));
            
            document.getElementById('productsTableBody').innerHTML = filtered.map(p => {
                let statusClass = '';
                let statusText = '';
                if (p.stock === 0) {
                    statusClass = 'status-out-stock';
                    statusText = 'Out of Stock';
                } else if (p.stock <= 5) {
                    statusClass = 'status-low-stock';
                    statusText = 'Low Stock';
                } else {
                    statusClass = 'status-in-stock';
                    statusText = 'In Stock';
                }
                
                return `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.name}</td>
                        <td>${p.category}</td>
                        <td>₱${p.price.toFixed(2)}</td>
                        <td>${p.stock}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td class="action-buttons">
                            <button class="btn-edit" onclick="editProduct(${p.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add New Product';
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productCategory').value = 'Rice & Grains';
            document.getElementById('productPrice').value = '';
            document.getElementById('productStock').value = '';
            document.getElementById('productModal').style.display = 'flex';
        }
        
        function editProduct(id) {
            let product = products.find(p => p.id === id);
            if (product) {
                document.getElementById('modalTitle').innerText = 'Edit Product';
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productCategory').value = product.category;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productStock').value = product.stock;
                document.getElementById('productModal').style.display = 'flex';
            }
        }
        
        function saveProduct() {
            let id = document.getElementById('productId').value;
            let name = document.getElementById('productName').value;
            let category = document.getElementById('productCategory').value;
            let price = parseFloat(document.getElementById('productPrice').value);
            let stock = parseInt(document.getElementById('productStock').value);
            
            if (!name || isNaN(price) || isNaN(stock)) {
                alert('Please fill all fields correctly');
                return;
            }
            
            if (id) {
                // Edit existing
                let index = products.findIndex(p => p.id == id);
                if (index !== -1) {
                    products[index] = { ...products[index], name, category, price, stock };
                }
            } else {
                // Add new
                products.push({ id: nextId++, name, category, price, stock });
            }
            
            saveProducts();
            renderProducts();
            closeModal();
        }
        
        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                products = products.filter(p => p.id !== id);
                saveProducts();
                renderProducts();
            }
        }
        
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        
        function logout() {
            localStorage.removeItem('loggedIn');
            localStorage.removeItem('username');
            window.location.href = 'accounts/login.html';
        }
        
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('active');
        });
        document.getElementById('searchInput').addEventListener('input', renderProducts);
        
        renderProducts();
    </script>
</body>
</html>
