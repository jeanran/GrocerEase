products.html

{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/products.css' %}">

<div class="products-container">

    <div class="page-header">
        <h1><i class="fas fa-boxes"></i> Product Inventory</h1>
        <button class="btn-add" onclick="openAddModal()">
            <i class="fas fa-plus"></i> Add Product
        </button>
    </div>
    
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products...">
    </div>
    
    <table class="products-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="productsTableBody"></tbody>
    </table>

</div>

<!-- Modal -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add New Product</h3>

        <input type="hidden" id="productId">
        <input type="text" id="productName" placeholder="Product Name">

        <select id="productCategory">
            <option value="Rice & Grains">Rice & Grains</option>
            <option value="Oils & Cooking">Oils & Cooking</option>
            <option value="Dairy & Eggs">Dairy & Eggs</option>
            <option value="Beverages">Beverages</option>
            <option value="Canned Goods">Canned Goods</option>
            <option value="Bakery">Bakery</option>
        </select>

        <input type="number" id="productPrice" placeholder="Price">
        <input type="number" id="productStock" placeholder="Stock Quantity">

        <div class="modal-actions">
            <button class="btn-save" onclick="saveProduct()">Save</button>
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = '/accounts/login/';
        }
        
        document.getElementById('userName').innerText = localStorage.getItem('username') || 'User';
        
        let products = JSON.parse(localStorage.getItem('products')) || [
            { id: 1, name: "Rice (5kg)", price: 245, stock: 12, category: "Rice & Grains" },
            { id: 2, name: "Cooking Oil 1L", price: 89.5, stock: 8, category: "Oils & Cooking" },
            { id: 3, name: "Milk 1L", price: 68, stock: 5, category: "Dairy & Eggs" },
            { id: 4, name: "Eggs (12pcs)", price: 120, stock: 15, category: "Dairy & Eggs" },
            { id: 5, name: "Bread", price: 55, stock: 3, category: "Bakery" },
            { id: 6, name: "Tomato Ketchup", price: 45, stock: 7, category: "Canned Goods" }
        ];
        
        let nextId = 7;
        
        function saveProducts() {
            localStorage.setItem('products', JSON.stringify(products));
        }
        
        function renderProducts() {
            let search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = products.filter(p => p.name.toLowerCase().includes(search));
            
            document.getElementById('productsTableBody').innerHTML = filtered.map(p => {
                let statusClass = '';
                let statusText = '';
                if (p.stock === 0) {
                    statusClass = 'status-out-stock';
                    statusText = 'Out of Stock';
                } else if (p.stock <= 5) {
                    statusClass = 'status-low-stock';
                    statusText = 'Low Stock';
                } else {
                    statusClass = 'status-in-stock';
                    statusText = 'In Stock';
                }
                
                return `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.name}</td>
                        <td>${p.category}</td>
                        <td>₱${p.price.toFixed(2)}</td>
                        <td>${p.stock}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td class="action-buttons">
                            <button class="btn-edit" onclick="editProduct(${p.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add New Product';
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productCategory').value = 'Rice & Grains';
            document.getElementById('productPrice').value = '';
            document.getElementById('productStock').value = '';
            document.getElementById('productModal').style.display = 'flex';
        }
        
        function editProduct(id) {
            let product = products.find(p => p.id === id);
            if (product) {
                document.getElementById('modalTitle').innerText = 'Edit Product';
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productCategory').value = product.category;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productStock').value = product.stock;
                document.getElementById('productModal').style.display = 'flex';
            }
        }
        
        function saveProduct() {
    let id = document.getElementById('productId').value;
    let name = document.getElementById('productName').value;
    let category = document.getElementById('productCategory').value;
    let price = parseFloat(document.getElementById('productPrice').value);
    let stock = parseInt(document.getElementById('productStock').value);

    if (!name || isNaN(price) || isNaN(stock)) {
        alert('Please fill all fields correctly');
        return;
    }

    if (id) {
        // ✅ EDIT EXISTING PRODUCT
        let product = products.find(p => p.id == id);
        if (product) {
            product.name = name;
            product.category = category;
            product.price = price;
            product.stock = stock;
        }
    } else {
        // ✅ ADD NEW PRODUCT
        products.push({
            id: nextId++,
            name,
            category,
            price,
            stock
        });
    }

    saveProducts();
    renderProducts();
    closeModal();
}
        
        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                products = products.filter(p => p.id !== id);
                saveProducts();
                renderProducts();
            }
        }
        
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        
        function logout() {
            localStorage.removeItem('loggedIn');
            localStorage.removeItem('username');
            window.location.href = '/accounts/login/';
        }
        
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('active');
        });
        document.getElementById('searchInput').addEventListener('input', renderProducts);
        
        renderProducts();
    </script>

{% endblock %}
