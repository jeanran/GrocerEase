{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/reports.css' %}">
{% endblock %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="reports-container">

    <h1>
        <i class="fas fa-chart-line"></i> Reports
    </h1>

    <div class="report-tabs">
        <button class="tab-btn active" onclick="switchTab('sales')">Sales</button>
        <button class="tab-btn" onclick="switchTab('inventory')">Inventory</button>
    </div>

    <!-- SALES -->
    <div id="salesPanel" class="report-panel active">

        <div class="report-summary">
            <div>Total Sales: <span id="totalSalesAmount">₱0</span></div>
            <div>Total Transactions: <span id="totalTransactions">0</span></div>
            <div>Average Sale: <span id="avgSale">₱0</span></div>
        </div>

        <canvas id="salesChart" style="height:300px;"></canvas>

        <table class="report-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>ID</th>
                    <th>Items</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="salesTableBody"></tbody>
        </table>

    </div>

    <!-- INVENTORY -->
    <div id="inventoryPanel" class="report-panel">

        <div class="report-summary">
            <div>Total Products: <span id="totalProductsCount">0</span></div>
            <div>Total Stock Value: <span id="totalStockValue">₱0</span></div>
            <div>Low Stock: <span id="lowStockCount">0</span></div>
        </div>

        <table class="report-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="inventoryTableBody"></tbody>
        </table>

    </div>

</div>

<script>
    

    // Username from Django session
    let userEl = document.getElementById('userName');
    if (userEl) userEl.innerText = '{{ username }}';

    // DATA — keeping localStorage for now, will connect to Supabase later
    let products = JSON.parse(localStorage.getItem('products')) || [
        { id: 1, name: "Rice (5kg)", price: 245, stock: 12, category: "Rice & Grains" },
        { id: 2, name: "Cooking Oil 1L", price: 89.5, stock: 8, category: "Oils & Cooking" },
        { id: 3, name: "Milk 1L", price: 68, stock: 5, category: "Dairy & Eggs" },
        { id: 4, name: "Eggs (12pcs)", price: 120, stock: 15, category: "Dairy & Eggs" },
        { id: 5, name: "Bread", price: 55, stock: 3, category: "Bakery" }
    ];

    let transactions = JSON.parse(localStorage.getItem('transactions')) || [
        { id: 1, date: "2024-01-15 14:30", items: [{ name: "Rice", qty: 2, price: 245 }], total: 548.8 },
        { id: 2, date: "2024-01-15 10:15", items: [{ name: "Milk", qty: 1, price: 68 }], total: 76.16 }
    ];

    let salesChart = null;

    // TAB SWITCH
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

        if (tab === 'sales') {
            document.querySelector('.tab-btn:first-child').classList.add('active');
            document.getElementById('salesPanel').classList.add('active');
            document.getElementById('inventoryPanel').classList.remove('active');
            loadSalesReport();
        } else {
            document.querySelector('.tab-btn:last-child').classList.add('active');
            document.getElementById('inventoryPanel').classList.add('active');
            document.getElementById('salesPanel').classList.remove('active');
            loadInventoryReport();
        }
    }

    // SALES REPORT
    function loadSalesReport() {
        let totalSales = transactions.reduce((sum, t) => sum + t.total, 0);
        let totalTrans = transactions.length;
        let avgSale = totalTrans ? totalSales / totalTrans : 0;

        document.getElementById('totalSalesAmount').innerText = '₱' + totalSales.toFixed(2);
        document.getElementById('totalTransactions').innerText = totalTrans;
        document.getElementById('avgSale').innerText = '₱' + avgSale.toFixed(2);

        let productMap = {};
        transactions.forEach(t => {
            (t.items || []).forEach(item => {
                if (!productMap[item.name]) {
                    productMap[item.name] = { qty: 0, revenue: 0 };
                }
                productMap[item.name].qty += item.qty;
                productMap[item.name].revenue += item.qty * item.price;
            });
        });

        let data = Object.entries(productMap).map(([name, val]) => ({
            name, qty: val.qty, revenue: val.revenue
        }));
        data.sort((a, b) => b.qty - a.qty);

        let labels = data.slice(0, 5).map(p => p.name);
        let chartData = data.slice(0, 5).map(p => p.revenue);
        let chartEl = document.getElementById('salesChart');

        if (chartEl) {
            if (salesChart) salesChart.destroy();
            salesChart = new Chart(chartEl, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'Top Products (₱)',
                        data: chartData,
                        backgroundColor: '#1e6f5c',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        document.getElementById('salesTableBody').innerHTML = data.map(p => `
            <tr>
                <td>${p.name}</td>
                <td>-</td>
                <td>${p.qty} sold</td>
                <td>₱${p.revenue.toFixed(2)}</td>
            </tr>
        `).join('');
    }

    // INVENTORY REPORT
    function loadInventoryReport() {
        let totalProducts = products.length;
        let totalStockValue = products.reduce((sum, p) => sum + (p.price * p.stock), 0);
        let lowStock = products.filter(p => p.stock <= 5).length;

        document.getElementById('totalProductsCount').innerText = totalProducts;
        document.getElementById('totalStockValue').innerHTML = `₱${totalStockValue.toFixed(2)}`;
        document.getElementById('lowStockCount').innerText = lowStock;

        document.getElementById('inventoryTableBody').innerHTML = products.map(p => `
            <tr>
                <td>${p.name}</td>
                <td>${p.category}</td>
                <td>₱${p.price.toFixed(2)}</td>
                <td>${p.stock}</td>
                <td>₱${(p.price * p.stock).toFixed(2)}</td>
                <td>${p.stock <= 5 ? '⚠️ Low Stock' : '✓ In Stock'}</td>
            </tr>
        `).join('');
    }

    // PRINT
    function printReport(type) {
        let printContent = document
            .getElementById(type === 'sales' ? 'salesPanel' : 'inventoryPanel')
            .cloneNode(true);

        let printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html>
                <head>
                    <title>${type.toUpperCase()} Report</title>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 20px; }
                        table { width: 100%; border-collapse: collapse; }
                        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                        th { background: #f5f5f5; }
                    </style>
                </head>
                <body>${printContent.innerHTML}</body>
            </html>
        `);
        printWindow.document.close();
        printWindow.print();
    }

    
    function logout() {
        window.location.href = '/logout/';
    }

    loadSalesReport();
</script>

{% endblock %}
