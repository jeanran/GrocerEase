{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pos.css' %}">
{% endblock %}

{% block content %}

<div class="pos-container">

    <!-- Products Panel -->
    <div class="pos-products">
        <div class="pos-header">
            <h2><i class="fas fa-search"></i> Select Products</h2>
            <input type="text" id="searchInput" class="product-search" placeholder="Search products...">
            
            <select id="categoryFilter" class="category-filter">
                <option value="all">All Categories</option>
                <option value="Rice & Grains">Rice & Grains</option>
                <option value="Oils & Cooking">Oils & Cooking</option>
                <option value="Dairy & Eggs">Dairy & Eggs</option>
                <option value="Beverages">Beverages</option>
                <option value="Canned Goods">Canned Goods</option>
            </select>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Cart Panel -->
    <div class="pos-cart">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-cart"></i> Current Sale</h2>
            <button class="btn-clear" id="clearCartBtn">
                <i class="fas fa-trash"></i> Clear Cart
            </button>
        </div>
        
        <div class="cart-items">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cartBody"></tbody>
            </table>
        </div>
        
        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">₱0.00</span>
            </div>
            <div class="summary-row">
                <span>Tax (12%):</span>
                <span id="tax">₱0.00</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span id="totalAmount">₱0.00</span>
            </div>
        </div>
        
        <div class="payment-section">
            <div class="payment-input">
                <label>Amount Received:</label>
                <input type="number" id="amountReceived" placeholder="0.00">
            </div>
            <div class="change-due">
                <label>Change:</label>
                <span id="changeDue">₱0.00</span>
            </div>

            <button class="btn-checkout" id="checkoutBtn">
                <i class="fas fa-check-circle"></i> Complete Sale
            </button>
        </div>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', async function () {

    let products = [];
    let cart = [];

    // ── LOAD PRODUCTS FROM SUPABASE ──
    async function loadProducts() {
        try {
            const res = await fetch('/api/products/');
            const data = await res.json();
            products = data.products || [];
            renderProducts();
        } catch (err) {
            alert('Failed to load products: ' + err.message);
        }
    }

    function renderProducts() {
        let search = document.getElementById('searchInput').value.toLowerCase();
        let category = document.getElementById('categoryFilter').value;

        let filtered = products.filter(p =>
            p.stock > 0 &&
            p.name.toLowerCase().includes(search) &&
            (category === 'all' || p.category === category)
        );

        document.getElementById('productsGrid').innerHTML = filtered.length === 0
            ? '<p style="color:#95a5a6;text-align:center;padding:40px;">No products available.</p>'
            : filtered.map(p => `
                <div class="product-card" onclick="addToCart('${p.product_id}')">
                    <h4>${p.name}</h4>
                    <div class="product-price">₱${parseFloat(p.price).toFixed(2)}</div>
                    <div class="product-stock">Stock: ${p.stock}</div>
                </div>
            `).join('');
    }

    function addToCart(product_id) {
        let product = products.find(p => p.product_id === product_id);
        if (!product || product.stock <= 0) return alert('Out of stock!');

        let existing = cart.find(i => i.product_id === product_id);
        if (existing) {
            if (existing.qty >= product.stock) return alert('Not enough stock!');
            existing.qty++;
        } else {
            cart.push({ ...product, qty: 1 });
        }

        renderCart();
    }

    function renderCart() {
        let subtotal = 0;

        document.getElementById('cartBody').innerHTML = cart.map((item, i) => {
            let total = parseFloat(item.price) * item.qty;
            subtotal += total;
            return `
                <tr>
                    <td>${item.name}</td>
                    <td><input type="number" min="1" value="${item.qty}" onchange="updateQty(${i}, this.value)"></td>
                    <td>₱${parseFloat(item.price).toFixed(2)}</td>
                    <td>₱${total.toFixed(2)}</td>
                    <td><button onclick="removeFromCart(${i})">X</button></td>
                </tr>
            `;
        }).join('');

        let tax = subtotal * 0.12;
        let total = subtotal + tax;

        document.getElementById('subtotal').innerText = '₱ ' + subtotal.toFixed(2);
        document.getElementById('tax').innerText = '₱ ' + tax.toFixed(2);
        document.getElementById('totalAmount').innerText = '₱ ' + total.toFixed(2);
    }

    function updateQty(i, qty) {
        let newQty = parseInt(qty);
        let product = products.find(p => p.product_id === cart[i].product_id);
        if (newQty > product.stock) {
            alert('Not enough stock!');
            newQty = product.stock;
        }
        if (newQty < 1) newQty = 1;
        cart[i].qty = newQty;
        renderCart();
    }

    function removeFromCart(i) {
        cart.splice(i, 1);
        renderCart();
    }

    function updateChange() {
        let total = parseFloat(document.getElementById('totalAmount').innerText.replace('₱', '').trim()) || 0;
        let received = parseFloat(document.getElementById('amountReceived').value) || 0;
        document.getElementById('changeDue').innerText = '₱ ' + (received - total).toFixed(2);
    }

    async function checkout() {
        if (cart.length === 0) { alert('Cart is empty!'); return; }

        let total = parseFloat(document.getElementById('totalAmount').innerText.replace('₱', '').trim());
        let received = parseFloat(document.getElementById('amountReceived').value) || 0;

        if (received < total) { alert('Insufficient payment!'); return; }

        try {
            const res = await fetch('/api/checkout/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({
                    items: cart.map(i => ({
                        product_id: i.product_id,
                        quantity: i.qty,
                        price: i.price,
                    })),
                    total: total,
                }),
            });
            const data = await res.json();
            if (data.success) {
                alert('Sale completed!\nTotal: ₱ ' + total.toFixed(2) + '\nChange: ₱ ' + (received - total).toFixed(2));
                cart = [];
                document.getElementById('amountReceived').value = '';
                document.getElementById('changeDue').innerText = '₱ 0.00';
                renderCart();
                await loadProducts(); // ← reload to show updated stock
            } else {
                alert('Checkout failed: ' + (data.message || 'Unknown error'));
            }
        } catch (err) {
            alert('Error: ' + err.message);
        }
    }

    function getCookie(name) {
        let value = `; ${document.cookie}`;
        let parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    document.getElementById('searchInput').addEventListener('input', renderProducts);
    document.getElementById('categoryFilter').addEventListener('change', renderProducts);
    document.getElementById('amountReceived').addEventListener('input', updateChange);
    document.getElementById('checkoutBtn').addEventListener('click', checkout);
    document.getElementById('clearCartBtn').addEventListener('click', function() {
        cart = [];
        renderCart();
    });

    window.addToCart = addToCart;
    window.updateQty = updateQty;
    window.removeFromCart = removeFromCart;

    await loadProducts();
});

function logout() {
    window.location.href = '/logout/';
}
</script>

{% endblock %}
