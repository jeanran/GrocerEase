{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/users.css' %}">
{% endblock %}

{% block content %}

<div class="users-container">

    <div class="page-header">
        <h1><i class="fas fa-users"></i> Manage Users</h1>
        <button class="btn-add" onclick="openAddModal()">
            <i class="fas fa-plus"></i> Add User
        </button>
    </div>

    <div id="alertBox" class="alert"></div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by username or role...">
    </div>

    <table class="users-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Username</th>
                <th>Role</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="usersTableBody">
            <tr>
                <td colspan="5" class="empty-state">Loading users...</td>
            </tr>
        </tbody>
    </table>

</div>

<!-- Add/Edit Modal -->
<div id="userModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add New User</h3>
        <input type="hidden" id="userId">
        <label class="modal-label">Username</label>
        <input type="text" id="inputUsername" placeholder="Enter username">
        <label class="modal-label">Password</label>
        <input type="password" id="inputPassword" placeholder="Enter password">
        <p class="password-hint" id="passwordHint"></p>
        <label class="modal-label">Role</label>
        <select id="inputRole">
            <option value="cashier">Cashier</option>
            <option value="admin">Admin</option>
        </select>
        <div class="modal-actions">
            <button class="btn-save" onclick="saveUser()">Save</button>
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h3>Delete User</h3>
        <p class="delete-confirm-text">Are you sure you want to delete <strong id="deleteUsername"></strong>? This cannot be undone.</p>
        <input type="hidden" id="deleteUserId">
        <div class="modal-actions">
            <button class="btn-delete-confirm" onclick="confirmDelete()">Delete</button>
            <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let allUsers = [];
    let isEditing = false;

    async function loadUsers() {
        try {
            const res = await fetch('/api/users/');
            const data = await res.json();
            allUsers = data.users || [];
            renderUsers(allUsers);
        } catch (err) {
            showAlert('Failed to load users. ' + err.message, 'error');
        }
    }

    function renderUsers(users) {
        let search = document.getElementById('searchInput').value.toLowerCase();
        let filtered = users.filter(u =>
            u.username.toLowerCase().includes(search) ||
            u.role.toLowerCase().includes(search)
        );

        if (filtered.length === 0) {
            document.getElementById('usersTableBody').innerHTML =
                '<tr><td colspan="5" class="empty-state">No users found.</td></tr>';
            return;
        }

        document.getElementById('usersTableBody').innerHTML = filtered.map((u, i) => `
            <tr>
                <td>${i + 1}</td>
                <td><i class="fas fa-user user-icon"></i>${u.username}</td>
                <td><span class="role-badge role-${u.role}">${u.role === 'admin' ? 'Admin' : 'Cashier'}</span></td>
                <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</td>
                <td class="action-buttons">
                    <button class="btn-edit" onclick="openEditModal('${u.user_id}', '${u.username}', '${u.role}')">
                        <i class="fas fa-edit"></i> Edit
                    </button>
                    <button class="btn-delete" onclick="openDeleteModal('${u.user_id}', '${u.username}')">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </td>
            </tr>
        `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', () => renderUsers(allUsers));

    function openAddModal() {
        isEditing = false;
        document.getElementById('modalTitle').innerText = 'Add New User';
        document.getElementById('userId').value = '';
        document.getElementById('inputUsername').value = '';
        document.getElementById('inputPassword').value = '';
        document.getElementById('inputRole').value = 'cashier';
        document.getElementById('passwordHint').innerText = '';
        document.getElementById('inputUsername').disabled = false;
        document.getElementById('userModal').classList.add('show');
    }

    function openEditModal(id, username, role) {
        isEditing = true;
        document.getElementById('modalTitle').innerText = 'Edit User';
        document.getElementById('userId').value = id;
        document.getElementById('inputUsername').value = username;
        document.getElementById('inputPassword').value = '';
        document.getElementById('inputRole').value = role;
        document.getElementById('passwordHint').innerText = 'Leave blank to keep current password';
        document.getElementById('inputUsername').disabled = true;
        document.getElementById('userModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('userModal').classList.remove('show');
    }

    async function saveUser() {
        let id = document.getElementById('userId').value;
        let username = document.getElementById('inputUsername').value.trim();
        let password = document.getElementById('inputPassword').value;
        let role = document.getElementById('inputRole').value;

        if (!username) { showAlert('Username is required.', 'error'); return; }
        if (!isEditing && !password) { showAlert('Password is required.', 'error'); return; }

        let url = isEditing ? `/api/users/${id}/edit/` : '/api/users/add/';
        let body = { username, role };
        if (password) body.password = password;

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (data.success) {
                showAlert(isEditing ? 'User updated successfully!' : 'User added successfully!', 'success');
                closeModal();
                loadUsers();
            } else {
                showAlert(data.message || 'Something went wrong.', 'error');
            }
        } catch (err) {
            showAlert('Error: ' + err.message, 'error');
        }
    }

    function openDeleteModal(id, username) {
        document.getElementById('deleteUserId').value = id;
        document.getElementById('deleteUsername').innerText = username;
        document.getElementById('deleteModal').classList.add('show');
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('show');
    }

    async function confirmDelete() {
        let id = document.getElementById('deleteUserId').value;
        try {
            const res = await fetch(`/api/users/${id}/delete/`, {
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') },
            });
            const data = await res.json();
            if (data.success) {
                showAlert('User deleted successfully!', 'success');
                closeDeleteModal();
                loadUsers();
            } else {
                showAlert(data.message || 'Failed to delete.', 'error');
            }
        } catch (err) {
            showAlert('Error: ' + err.message, 'error');
        }
    }

    function showAlert(msg, type) {
        let box = document.getElementById('alertBox');
        box.innerText = msg;
        box.className = `alert alert-${type} show`;
        setTimeout(() => box.classList.remove('show'), 3000);
    }

    function getCookie(name) {
        let value = `; ${document.cookie}`;
        let parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    function logout() {
        window.location.href = '/logout/';
    }

    loadUsers();
</script>

{% endblock %}
